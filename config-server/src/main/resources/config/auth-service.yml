server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://postgres:5432/auth_db
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1200000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer



eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: $2a$10$z3kMFnMBz8F1S3tr6dj5HerUqBNBP4wMRiPfIV1MkgeyeJcT5Monm
  expiration: 900000
  refresh-expiration: 604800000

internal:
  service:
    transaction-service:
      # ${TRANSACTION_SERVICE_CLIENT_SECRET_HASH}
      client-secret: $2a$10$z3kMFnMBz8F1S3tr6dj5HerUqBNBP4wMRiPfIV1MkgeyeJcT5Monm
    token-expiration-ms: 300000

logging:
  level:
    org.springframework.security: DEBUG

security:
  max-failed-attempts: 5
  lock-duration-minutes: 15

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
info:
  app:
    name: Auth Service
    version: 1.0.0
    description: Authentication and Authorization Service